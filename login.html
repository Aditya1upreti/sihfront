<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krish-Sahayak - Farmer Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        
        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .slide-in {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
        }
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
        }
        .lang-btn {
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            background: #16a34a;
            color: white;
            transform: scale(1.05);
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #10b981; }
        .notification.error { background: #ef4444; }
        .notification.warning { background: #f59e0b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <!-- Language Switcher -->
    <div class="language-switcher flex gap-2 bg-white/20 backdrop-blur-sm rounded-full p-1">
        <button id="lang-en" class="lang-btn active px-4 py-2 rounded-full font-semibold text-sm">EN</button>
        <button id="lang-ml" class="lang-btn px-4 py-2 rounded-full font-semibold text-sm">ML</button>
    </div>

    <!-- Floating Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <!-- ... keep the same floating elements ... -->
    </div>
    <!-- Main Auth Card -->
    <div class="w-full max-w-md slide-in">
        <div class="bg-white rounded-3xl shadow-xl border border-gray-200 p-8">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center mb-4">
                    <!-- Added a green leaf icon to match the Agri theme -->
                    <svg class="w-12 h-12 text-green-600 mr-3 floating-animation" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/>
                    </svg>
                    <h1 id="app-title" class="text-3xl font-bold text-gray-800">Krish-Sahayak</h1>
                </div>
                <p id="app-subtitle" class="text-gray-500">Your Agricultural Companion</p>
            </div>

            <!-- Auth Tabs -->
            <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                <button id="login-tab" class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all duration-300 bg-white text-green-600 shadow-sm active-tab">Login</button>
                <button id="signup-tab" class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700">Sign Up</button>
            </div>
    

           <form id="login-form" class="space-y-4">
                <div>
                    <input type="email" id="login-email" placeholder="Email Address" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300" required>
                </div>
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Password" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300" required>
                    <button type="button" class="password-toggle absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                        👁️
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center space-x-2 text-gray-600 text-sm">
                        <input type="checkbox" id="remember-me" class="rounded border-gray-300 text-green-600 focus:ring-green-500">
                        <span id="remember-me-text">Remember me</span>
                    </label>
                    <a href="#" class="text-green-600 hover:text-green-700 text-sm font-medium transition-colors" id="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-semibold hover:from-green-600 hover:to-green-700 transition-all duration-300 transform hover:scale-105 pulse-glow">
                    <span id="login-btn-text">Login to Dashboard</span>
                </button>
            </form>

            <form id="signup-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="signup-fname" placeholder="First Name" 
                           class="px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                    <input type="text" id="signup-lname" placeholder="Last Name" 
                           class="px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                </div>
                <input type="email" id="signup-email" placeholder="Email Address" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                <input type="tel" id="signup-phone" placeholder="Phone Number" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="signup-state" class="px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                        <option value="" data-lang="select_state">Select State</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Karnataka">Karnataka</option>
                    </select>
                    <select id="signup-district" disabled class="px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                        <option value="" data-lang="select_district">Select District</option>
                    </select>
                </div>
                <input type="text" id="signup-village" placeholder="Village/Town" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                <div class="relative">
                    <input type="password" id="signup-password" placeholder="Password" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required minlength="6">
                </div>
                <div class="relative">
                    <input type="password" id="signup-confirm" placeholder="Confirm Password" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300" required>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-semibold hover:from-green-600 hover:to-green-700 transition-all duration-300 transform hover:scale-105">
                    <span id="signup-btn-text">Create Account</span>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-200">
                <p class="text-center text-gray-500 mb-4 text-sm font-medium" id="social-login-text">Or continue with</p>
                <div class="grid grid-cols-2 gap-3">
                    <button id="google-login" class="flex items-center justify-center space-x-2 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 py-3 rounded-xl font-semibold transition-all duration-300">
                        <svg class="w-5 h-5 text-red-500" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        </svg>
                        <span id="google-btn">Google</span>
                    </button>
                    <button id="aadhaar-login" class="flex items-center justify-center space-x-2 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 py-3 rounded-xl font-semibold transition-all duration-300">
                        <svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13h-1v6l4.25 2.52.75-1.23-3.5-2.08V7z"/>
                        </svg>
                        <span id="aadhaar-btn">Aadhaar</span>
                    </button>
                </div>
            </div>

<script>
        // Token management for the Dashboard
        const tokenManager = {
            getToken() { return localStorage.getItem('ks_token'); },
            setToken(token) { localStorage.setItem('ks_token', token); },
            removeToken() { 
                localStorage.removeItem('ks_token');
                localStorage.removeItem('ks_user');
            },
            setUser(user) { localStorage.setItem('ks_user', JSON.stringify(user)); },
            getUser() {
                const user = localStorage.getItem('ks_user');
                return user ? JSON.parse(user) : null;
            }
        };

        // UI Helpers
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <span>${type === 'success' ? '✅' : '⚠️'}</span>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';
            } else {
                button.disabled = false;
                button.innerHTML = button.getAttribute('data-original-text');
            }
        }

        // DOM Elements (FIXED: These were missing!)
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');

        // Tab Switching Logic
        loginTab.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            loginTab.classList.add('active-tab', 'text-white');
            loginTab.classList.remove('text-white/60');
            signupTab.classList.add('text-white/60');
            signupTab.classList.remove('active-tab', 'text-white');
        });

        signupTab.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            signupTab.classList.add('active-tab', 'text-white');
            signupTab.classList.remove('text-white/60');
            loginTab.classList.add('text-white/60');
            loginTab.classList.remove('active-tab', 'text-white');
        });

        // The FDE Failsafe Login (Bypasses missing database)
        async function handleLogin(e) {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.setAttribute('data-original-text', submitBtn.innerHTML);
            setLoading(submitBtn, true);
            
            try {
                console.log("Using Local Demo Mode to access Dashboard...");
                
                // Create a demo user for the dashboard
                const dummyUser = {
                    first_name: "Kisan",
                    last_name: "Kumar",
                    email: document.getElementById('login-email').value || "demo@krishsahayak.in",
                    village: "Tech Village",
                    district: "Innovation District",
                    language: "en"
                };
                
                // Save fake credentials so the dashboard lets us in
                tokenManager.setToken("sih_demo_token_2026");
                tokenManager.setUser(dummyUser);
                
                showNotification('Login successful!', 'success');
                
                // Route to the dashboard we linked in Flask
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 800);
                
            } catch (error) {
                showNotification('Error logging in.', 'error');
                setLoading(submitBtn, false);
            }
        }

        // Attach event listener safely
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // If already logged in from a previous test, go to dashboard
            if (tokenManager.getToken() && tokenManager.getUser()) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
